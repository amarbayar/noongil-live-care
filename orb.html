<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossy AI Orb - Smooth Spin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

        :root {
            /* Neutral State Colors */
            --bg-top: #00c6ff;
            --bg-bottom: #8e2de2;
            
            --orb-c1: rgba(0, 255, 255, 0.6);
            --orb-c2: rgba(255, 105, 255, 0.6);
            
            --orb-scale: 1;
            --orb-speed: 6s;
            --wave-anim: wave-idle 2s ease-in-out infinite;
        }

        /* -------------------------------------------
           Base Setup & Background
        -------------------------------------------- */
        * { box-sizing: border-box; user-select: none; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: linear-gradient(180deg, var(--bg-top) 0%, #4a54e1 40%, var(--bg-bottom) 100%);
            transition: background 1.5s ease;
        }

        .app-container {
            position: relative;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* -------------------------------------------
           The Glossy Orb Architecture
        -------------------------------------------- */
        .orb-wrapper {
            position: relative;
            width: 300px; height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: scale(var(--orb-scale));
        }

        /* 1. The Spinning Gradient Core */
        .orb {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%; /* Perfect round shape */
            
            /* Off-center gradient so the spin is visible */
            background: radial-gradient(circle at 35% 45%, 
                rgba(255, 255, 255, 0.8) 0%, 
                var(--orb-c1) 20%, 
                var(--orb-c2) 55%, 
                rgba(100, 50, 255, 0.8) 100%);
            
            /* LINEAR makes the spin continuous with no sticking/stuttering */
            animation: spin var(--orb-speed) linear infinite;
            transition: background 1.5s ease;
        }

        /* 2. The Stationary Glass Shell (Highlights & Shadows) */
        .orb-glass {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            
            /* Complex shadows to create 3D glass effect */
            box-shadow: 
                inset 20px 20px 40px rgba(255, 255, 255, 0.9),    /* Top left highlight */
                inset -20px -20px 50px rgba(100, 0, 255, 0.4),    /* Bottom right core shadow */
                inset 0 0 20px rgba(255, 255, 255, 0.5),          /* Inner edge glow */
                0 0 40px rgba(255, 255, 255, 0.3),                /* Outer ambient glow */
                0 20px 60px rgba(0, 0, 0, 0.1);                   /* Drop shadow */
            
            backdrop-filter: blur(10px);
            transition: box-shadow 1s ease;
            pointer-events: none; /* Allows clicks to pass through to wrapper */
        }

        /* Continuous 360 Spin Keyframe */
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* -------------------------------------------
           State Machine CSS Variables
        -------------------------------------------- */
        
        /* 1. Neutral State */
        body[data-state="neutral"] {
            --bg-top: #00c6ff; --bg-bottom: #8e2de2;
            --orb-c1: rgba(0, 255, 255, 0.6); --orb-c2: rgba(255, 105, 255, 0.6);
            --orb-scale: 1; --orb-speed: 8s;
            --wave-anim: wave-idle 2s ease-in-out infinite;
        }

        /* 2. Listening State */
        body[data-state="listening"] {
            --bg-top: #2193b0; --bg-bottom: #6dd5ed;
            --orb-c1: rgba(255, 255, 255, 0.8); --orb-c2: rgba(0, 200, 255, 0.8);
            --orb-scale: 1.1; --orb-speed: 4s;
            --wave-anim: wave-listen 1s ease-in-out infinite alternate;
        }

        /* 3. Thinking State */
        body[data-state="thinking"] {
            --bg-top: #4b6cb7; --bg-bottom: #182848;
            --orb-c1: rgba(0, 255, 150, 0.6); --orb-c2: rgba(0, 100, 255, 0.8);
            --orb-scale: 0.95; --orb-speed: 2s; /* Spins much faster */
            --wave-anim: wave-think 0.6s ease-in-out infinite alternate;
        }
        /* Specific thinking pulse animation on the glass */
        body[data-state="thinking"] .orb-glass {
            animation: pulse-think 1s ease-in-out infinite alternate;
        }
        @keyframes pulse-think {
            from { box-shadow: inset 20px 20px 40px rgba(255,255,255,0.9), 0 0 20px rgba(0, 255, 150, 0.2); }
            to   { box-shadow: inset 20px 20px 40px rgba(255,255,255,1), 0 0 60px rgba(0, 255, 150, 0.6); }
        }

        /* 4. Speaking State */
        body[data-state="speaking"] {
            --bg-top: #ff758c; --bg-bottom: #ff7eb3;
            --orb-c1: rgba(255, 255, 255, 0.9); --orb-c2: rgba(255, 50, 150, 0.8);
            --orb-scale: 1.05; --orb-speed: 4s;
        }
        /* Make the whole orb wrapper pulse with "speech" */
        body[data-state="speaking"] .orb-wrapper {
            animation: pulse-wrapper 0.4s ease-in-out infinite alternate;
        }
        @keyframes pulse-wrapper {
            0%   { transform: scale(1.05); filter: brightness(1); }
            100% { transform: scale(1.12); filter: brightness(1.15); }
        }

        /* -------------------------------------------
           UI Layer (Waveform & Input)
        -------------------------------------------- */
        .ui-layer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 5;
        }

        .status-text {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .waveform {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 30px;
        }

        .bar {
            width: 4px;
            height: 10px;
            background: rgba(255,255,255,0.8);
            border-radius: 4px;
            animation: var(--wave-anim);
        }

        /* Stagger waveform bar animations */
        .bar:nth-child(1), .bar:nth-child(15) { animation-delay: 0.1s; }
        .bar:nth-child(2), .bar:nth-child(14) { animation-delay: 0.2s; }
        .bar:nth-child(3), .bar:nth-child(13) { animation-delay: 0.3s; }
        .bar:nth-child(4), .bar:nth-child(12) { animation-delay: 0.4s; }
        .bar:nth-child(5), .bar:nth-child(11) { animation-delay: 0.5s; }
        .bar:nth-child(6), .bar:nth-child(10) { animation-delay: 0.6s; }
        .bar:nth-child(7), .bar:nth-child(9) { animation-delay: 0.7s; }
        .bar:nth-child(8) { animation-delay: 0.8s; }

        @keyframes wave-idle {
            0%, 100% { height: 6px; }
            50% { height: 10px; }
        }
        @keyframes wave-listen {
            0% { height: 8px; }
            100% { height: 24px; }
        }
        @keyframes wave-think {
            0% { height: 4px; }
            100% { height: 16px; }
        }
        
        /* Speaking state waveform */
        body[data-state="speaking"] .bar:nth-child(even) { animation: wave-speak-1 0.3s infinite alternate ease-in-out; }
        body[data-state="speaking"] .bar:nth-child(odd) { animation: wave-speak-2 0.4s infinite alternate ease-in-out; }
        @keyframes wave-speak-1 { 0% { height: 10px; } 100% { height: 35px; } }
        @keyframes wave-speak-2 { 0% { height: 15px; } 100% { height: 25px; } }

        /* Fake Input Bar */
        .input-bar {
            width: 85%;
            max-width: 400px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            justify-content: space-between;
        }

        .input-icon {
            width: 24px; height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
        }

        .mic-icon {
            width: 24px; height: 24px;
            fill: rgba(255,255,255,0.8);
        }
    </style>
</head>
<body data-state="neutral">

    <div class="app-container">
        
        <!-- Main Orb (Split into Color and Glass) -->
        <div class="orb-wrapper" id="orbBtn">
            <div class="orb"></div>
            <div class="orb-glass"></div>
        </div>

        <!-- Bottom UI Layer -->
        <div class="ui-layer">
            <div class="status-text" id="statusText">Tap Orb to Listen</div>
            
            <div class="waveform">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>

            <div class="input-bar">
                <div class="input-icon"></div>
                <svg class="mic-icon" viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </div>
        </div>

    </div>

    <script>
        const body = document.body;
        const orbBtn = document.getElementById('orbBtn');
        const statusText = document.getElementById('statusText');

        // Text mappings for the states
        const stateLabels = {
            'neutral': 'Tap Orb to Listen',
            'listening': 'Listening... (Tap anywhere)',
            'thinking': 'Thinking... (Tap anywhere)',
            'speaking': 'Speaking... (Tap anywhere)'
        };

        // 1. Specifically tap the orb to go from Neutral -> Listening
        orbBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Stop the document click from firing immediately
            let currentState = body.getAttribute('data-state');
            
            if (currentState === 'neutral') {
                setState('listening');
            } else {
                // If already active, tapping orb acts like tapping the screen (cycles states)
                cycleStates(currentState);
            }
        });

        // 2. Tap anywhere else to cycle through the rest of the states
        document.addEventListener('click', () => {
            let currentState = body.getAttribute('data-state');
            
            // Only cycle if we are NOT in neutral (Neutral requires orb click)
            if (currentState !== 'neutral') {
                cycleStates(currentState);
            }
        });

        function cycleStates(currentState) {
            if (currentState === 'listening') {
                setState('thinking');
            } else if (currentState === 'thinking') {
                setState('speaking');
            } else if (currentState === 'speaking') {
                setState('neutral');
            }
        }

        function setState(newState) {
            body.setAttribute('data-state', newState);
            statusText.textContent = stateLabels[newState];
        }
    </script>
</body>
</html>
