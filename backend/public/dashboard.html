async function startVoiceRecording() {
  try {
    if (!navigator.mediaDevices?.getUserMedia) throw new Error('Microphone not supported.');
    voiceComposerState.error = ''; voiceComposerState.statusMessage = I18n.t('mic_active');
    voiceComposerState.isRecording = true; voiceComposerState.audioBase64 = null; voiceComposerState.durationSeconds = 0;
    voiceRecorderSession = await createWavRecorder();
  } catch (e) { voiceComposerState.isRecording = false; voiceComposerState.error = e.message; }
  finally { renderCurrentDashboard(); }
}

async function stopVoiceRecording() {
  if (!voiceRecorderSession) return;
  try {
    const result = await voiceRecorderSession.stop();
    voiceComposerState.audioBase64 = await arrayBufferToBase64(result.arrayBuffer);
    voiceComposerState.durationSeconds = result.durationSeconds;
    voiceComposerState.statusMessage = I18n.t('recording_ready');
    voiceComposerState.mimeType = 'audio/wav';
  } catch (e) { voiceComposerState.error = e.message; }
  finally { voiceComposerState.isRecording = false; voiceRecorderSession = null; renderCurrentDashboard(); }
}

async function sendVoiceMessage() {
  if (!selectedMemberId || !voiceComposerState.audioBase64) return;
  await getToken();
  voiceComposerState.isSending = true; voiceComposerState.error = '';
  voiceComposerState.statusMessage = I18n.t('sending');
  renderCurrentDashboard();
  try {
    const res = await fetch(`/api/caregiver/members/${selectedMemberId}/voice-messages`, {
      method: 'POST', headers: { ...authHeaders(), 'content-type': 'application/json' },
      body: JSON.stringify({ audioBase64: voiceComposerState.audioBase64, mimeType: voiceComposerState.mimeType, durationSeconds: Math.max(1, voiceComposerState.durationSeconds) }),
    });
    if (!res.ok) throw new Error(`Send failed (${res.status}).`);
    voiceComposerState = { isRecording: false, isSending: false, statusMessage: I18n.t('sent_success'), error: '', audioBase64: null, mimeType: 'audio/wav', durationSeconds: 0, sentAt: new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) };
  } catch (e) { voiceComposerState.isSending = false; voiceComposerState.error = e.message; }
  finally { voiceComposerState.isSending = false; renderCurrentDashboard(); }
}

function resetVoiceComposer() {
  if (voiceRecorderSession) { voiceRecorderSession.stop().catch(() => {}); voiceRecorderSession = null; }
  voiceComposerState = { isRecording: false, isSending: false, statusMessage: '', error: '', audioBase64: null, mimeType: 'audio/wav', durationSeconds: 0, sentAt: '' };
}

async function createWavRecorder() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtx) throw new Error('AudioContext unavailable.');
  const audioContext = new AudioCtx();
  const source = audioContext.createMediaStreamSource(stream);
  const processor = audioContext.createScriptProcessor(4096, 1, 1);
  const chunks = []; const startedAt = performance.now();
  processor.onaudioprocess = e => chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
  source.connect(processor); processor.connect(audioContext.destination);
  return { async stop() {
    processor.disconnect(); source.disconnect(); stream.getTracks().forEach(t => t.stop()); await audioContext.close();
    const sampleRate = audioContext.sampleRate || 44100;
    const merged = mergeFloat32Chunks(chunks);
    const downsampled = sampleRate === 16000 ? merged : downsampleBuffer(merged, sampleRate, 16000);
    return { arrayBuffer: encodeWav(downsampled, 16000), durationSeconds: (performance.now() - startedAt) / 1000 };
  }};
}

function mergeFloat32Chunks(chunks) { const total = chunks.reduce((s, c) => s + c.length, 0); const m = new Float32Array(total); let o = 0; chunks.forEach(c => { m.set(c, o); o += c.length; }); return m; }

function downsampleBuffer(buffer, inputRate, outputRate) {
  if (outputRate >= inputRate) return buffer;
  const ratio = inputRate / outputRate; const newLen = Math.round(buffer.length / ratio);
  const result = new Float32Array(newLen); let oR = 0, oB = 0;
  while (oR < result.length) { const next = Math.round((oR + 1) * ratio); let acc = 0, cnt = 0; for (let i = oB; i < next && i < buffer.length; i++) { acc += buffer[i]; cnt++; } result[oR] = cnt ? acc / cnt : 0; oR++; oB = next; }
  return result;
}

function encodeWav(samples, sampleRate) {
  const buf = new ArrayBuffer(44 + samples.length * 2); const v = new DataView(buf);
  writeAscii(v, 0, 'RIFF'); v.setUint32(4, 36 + samples.length * 2, true); writeAscii(v, 8, 'WAVE');
  writeAscii(v, 12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, sampleRate, true); v.setUint32(28, sampleRate * 2, true); v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  writeAscii(v, 36, 'data'); v.setUint32(40, samples.length * 2, true);
  let o = 44; for (let i = 0; i < samples.length; i++, o += 2) { const s = Math.max(-1, Math.min(1, samples[i])); v.setInt16(o, s < 0 ? s * 0x8000 : s * 0x7FFF, true); }
  return buf;
}

function writeAscii(v, o, t) { for (let i = 0; i < t.length; i++) v.setUint8(o + i, t.charCodeAt(i)); }

async function arrayBufferToBase64(buffer) {
  const bytes = new Uint8Array(buffer); let binary = ''; const cs = 0x8000;
  for (let i = 0; i < bytes.length; i += cs) binary += String.fromCharCode(...bytes.subarray(i, i + cs));
  return btoa(binary);
}

// ── Sparklines ──
function makeSparklineRow(label, series, dates, colors, unit, maxVal) {
  const row = document.createElement('div'); row.className = 'n-sparkline';
  const lastVal = lastNonNull(series);
  const displayVal = lastVal !== null ? `${lastVal}${unit}` : '—';
  row.innerHTML = `<div class="n-sparkline__label">${escapeHtml(label)}</div><canvas class="n-sparkline__canvas" data-sparkline></canvas><div class="n-sparkline__value" style="color:${colors.text}">${displayVal}</div>`;
  const canvas = row.querySelector('canvas');
  canvas._sparkData = { series, colors, maxVal };
  return row;
}

function drawSparkline(canvas) {
  const { series, colors, maxVal } = canvas._sparkData;
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = rect.width, h = rect.height;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
  const points = []; for (let i = 0; i < series.length; i++) { if (series[i] !== null) points.push({ x: i, y: series[i] }); }
  if (points.length < 2) return;
  const pad = 2, chartW = w - pad * 2, chartH = h - pad * 2;
  const xScale = chartW / (series.length - 1);
  const effectiveMax = maxVal || Math.max(...points.map(p => p.y), 1);
  function px(p) { return { x: pad + p.x * xScale, y: pad + chartH - (p.y / effectiveMax) * chartH }; }

  // Smooth bezier fill
  const first = px(points[0]), last = px(points[points.length - 1]);
  ctx.beginPath(); ctx.moveTo(first.x, h); ctx.lineTo(first.x, first.y);
  for (let i = 1; i < points.length; i++) { const prev = px(points[i-1]), curr = px(points[i]); const cpx = (prev.x + curr.x) / 2; ctx.quadraticCurveTo(prev.x, prev.y, cpx, (prev.y + curr.y) / 2); }
  ctx.lineTo(last.x, last.y); ctx.lineTo(last.x, h); ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, 0, h); grad.addColorStop(0, colors.fill); grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad; ctx.fill();

  // Smooth bezier line
  ctx.beginPath(); ctx.moveTo(first.x, first.y);
  for (let i = 1; i < points.length; i++) { const prev = px(points[i-1]), curr = px(points[i]); const cpx = (prev.x + curr.x) / 2; ctx.quadraticCurveTo(prev.x, prev.y, cpx, (prev.y + curr.y) / 2); }
  ctx.lineTo(last.x, last.y);
  ctx.strokeStyle = colors.line; ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.stroke();

  // Glow dot
  ctx.beginPath(); ctx.arc(last.x, last.y, 4, 0, Math.PI * 2); ctx.fillStyle = colors.line; ctx.fill();
  ctx.beginPath(); ctx.arc(last.x, last.y, 6, 0, Math.PI * 2); ctx.strokeStyle = colors.fill; ctx.lineWidth = 2; ctx.stroke();
}

// ── Utils ──
function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
function prettyDate(value) { try { const [y, m, d] = String(value).split('-').map(Number); if (!y || !m || !d) return value; return new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' }).format(new Date(Date.UTC(y, m - 1, d, 12))); } catch { return value; } }
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function prettifyMetric(name) { const m = { mood: 'Mood', sleepHours: 'Sleep hours', sleepQuality: 'Sleep quality', medAdherence: 'Med adherence' }; return m[name] || capitalize(name); }
function prettifyNodeLabel(node) {
  if (node.type === 'Symptom') return `${capitalize(node.data?.type || node.label)} ${node.data?.severity ? node.data.severity + '/5' : ''}`.trim();
  if (node.type === 'MedicationDose') return `${node.data?.medicationName || node.label}${node.data?.status ? ` (${node.data.status})` : ''}`;
  if (node.type === 'SleepEntry' && typeof node.data?.hours === 'number') return `${node.data.hours}h sleep`;
  if (node.type === 'MoodEntry' && typeof node.data?.score === 'number') return `Mood ${node.data.score}/5`;
  return node.label;
}
function prettifyType(type) { const m = { Day: 'Day', MoodEntry: 'Mood', SleepEntry: 'Sleep', Symptom: 'Symptom', MedicationDose: 'Medication', Trigger: 'Trigger', Activity: 'Activity', Concern: 'Concern', PatternMetric: 'Pattern' }; return m[type] || type; }
function sanitizeMetricKey(v) { return String(v ?? '').trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, ''); }
function noData() { const d = document.createElement('div'); d.className = 'n-empty__text'; d.textContent = I18n.t('no_data'); return d; }
function hasData(s) { return s && s.some(v => v !== null); }
function lastNonNull(a) { if (!a) return null; for (let i = a.length - 1; i >= 0; i--) { if (a[i] !== null) return a[i]; } return null; }
function average(a) { if (!a) return null; const n = a.filter(v => v !== null); if (n.length === 0) return null; return n.reduce((s, v) => s + v, 0) / n.length; }
function scheduleValue(schedule, key, fallback) { if (!schedule) return fallback; const r = schedule[key]; if (r && typeof r === 'object' && 'value' in r) return r.value ?? fallback; return r ?? fallback; }
function anyValue(raw, fallback = '') { if (raw && typeof raw === 'object' && 'value' in raw) return raw.value ?? fallback; return raw ?? fallback; }
function arrayValue(raw) { const v = anyValue(raw, []); return Array.isArray(v) ? v.filter(i => typeof i === 'string') : []; }
function boolValue(raw, fallback = false) { const v = anyValue(raw, fallback); return typeof v === 'boolean' ? v : fallback; }
function objectValue(raw) { const v = anyValue(raw, null); return v && typeof v === 'object' && !Array.isArray(v) ? v : null; }

function normalizeTimeSeriesRange(timeSeries, start, end) {
  const source = timeSeries || {};
  const rangeDates = enumerateIsoDates(start, end);
  const dateIndex = new Map((source.dates || []).map((d, i) => [d, i]));
  const pick = (series, date) => { if (!Array.isArray(series)) return null; const idx = dateIndex.get(date); return idx !== undefined ? (series[idx] ?? null) : null; };
  const normalized = { dates: rangeDates, moodSeries: rangeDates.map(d => pick(source.moodSeries, d)), sleepHoursSeries: rangeDates.map(d => pick(source.sleepHoursSeries, d)), sleepQualitySeries: rangeDates.map(d => pick(source.sleepQualitySeries, d)), medAdherenceSeries: rangeDates.map(d => pick(source.medAdherenceSeries, d)), symptomSeries: {} };
  Object.entries(source.symptomSeries || {}).forEach(([type, series]) => { normalized.symptomSeries[type] = rangeDates.map(d => pick(series, d)); });
  normalized.missingDates = rangeDates.filter((date, idx) => {
    const hasCore = [normalized.moodSeries[idx], normalized.sleepHoursSeries[idx], normalized.sleepQualitySeries[idx], normalized.medAdherenceSeries[idx]].some(v => v !== null && v !== undefined);
    const hasSym = Object.values(normalized.symptomSeries).some(s => s[idx] !== null && s[idx] !== undefined);
    return !hasCore && !hasSym;
  });
  return normalized;
}

function enumerateIsoDates(start, end) {
  const dates = []; const cursor = parseIsoDate(start); const last = parseIsoDate(end);
  if (!cursor || !last || cursor > last) return dates;
  while (cursor <= last) { dates.push(fmt(cursor)); cursor.setUTCDate(cursor.getUTCDate() + 1); }
  return dates;
}

function parseIsoDate(value) { const [y, m, d] = String(value || '').split('-').map(Number); if (!y || !m || !d) return null; return new Date(Date.UTC(y, m - 1, d, 12)); }

let resizeTimer;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(() => { document.querySelectorAll('[data-sparkline]').forEach(drawSparkline); }, 200); });

setLoadingState(true);
