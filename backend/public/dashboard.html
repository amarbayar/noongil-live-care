<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noongil — Wellness Insights</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
/* ═══════════════════════════════════════════════════════════════
   Layer 1 — Design Tokens
   ═══════════════════════════════════════════════════════════════ */
:root {
  /* ── Color Primitives: Slate ── */
  --slate-50:  #F8FAFC;
  --slate-100: #F1F5F9;
  --slate-200: #E2E8F0;
  --slate-300: #CBD5E1;
  --slate-400: #94A3B8;
  --slate-500: #64748B;
  --slate-600: #475569;
  --slate-700: #334155;
  --slate-800: #1E293B;
  --slate-900: #0F172A;

  /* ── Color Primitives: Blue ── */
  --blue-50:  #EFF6FF;
  --blue-100: #DBEAFE;
  --blue-200: #BFDBFE;
  --blue-400: #60A5FA;
  --blue-500: #3B82F6;
  --blue-600: #2563EB;
  --blue-700: #1D4ED8;

  /* ── Color Primitives: Violet ── */
  --violet-50:  #F5F3FF;
  --violet-100: #EDE9FE;
  --violet-400: #A78BFA;
  --violet-500: #8B5CF6;
  --violet-600: #7C3AED;

  /* ── Color Primitives: Teal ── */
  --teal-50:  #F0FDFA;
  --teal-100: #CCFBF1;
  --teal-400: #2DD4BF;
  --teal-500: #14B8A6;
  --teal-600: #0D9488;
  --teal-700: #0F766E;

  /* ── Color Primitives: Red ── */
  --red-50:  #FEF2F2;
  --red-100: #FEE2E2;
  --red-400: #F87171;
  --red-500: #EF4444;
  --red-600: #DC2626;

  /* ── Color Primitives: Amber ── */
  --amber-50:  #FFFBEB;
  --amber-100: #FEF3C7;
  --amber-400: #FBBF24;
  --amber-500: #F59E0B;
  --amber-600: #D97706;

  /* ── Semantic: Surfaces & Text ── */
  --color-bg:             var(--slate-50);
  --color-surface:        #FFFFFF;
  --color-raised:         var(--slate-100);
  --color-text:           var(--slate-800);
  --color-text-secondary: var(--slate-500);
  --color-text-dim:       var(--slate-400);

  /* ── Semantic: Borders ── */
  --color-border:       rgba(30, 41, 59, 0.08);
  --color-border-focus: rgba(30, 41, 59, 0.20);

  /* ── Semantic: Category Colors ── */
  --color-mood:     var(--blue-600);
  --color-sleep:    var(--violet-600);
  --color-med:      var(--teal-700);
  --color-symptom:  var(--red-600);
  --color-trigger:  var(--amber-600);
  --color-activity: var(--teal-500);

  /* ── Semantic: Category Tints ── */
  --color-mood-bg:     var(--blue-50);
  --color-sleep-bg:    var(--violet-50);
  --color-med-bg:      var(--teal-50);
  --color-symptom-bg:  var(--red-50);
  --color-trigger-bg:  var(--amber-50);
  --color-activity-bg: var(--teal-50);

  /* ── Shadows ── */
  --shadow-xs: 0 1px 2px rgba(30, 41, 59, 0.04);
  --shadow-sm: 0 2px 8px rgba(30, 41, 59, 0.06), 0 1px 2px rgba(30, 41, 59, 0.04);
  --shadow-md: 0 4px 12px rgba(30, 41, 59, 0.08), 0 2px 4px rgba(30, 41, 59, 0.04);
  --shadow-lg: 0 8px 24px rgba(30, 41, 59, 0.10), 0 4px 8px rgba(30, 41, 59, 0.05);

  /* ── Glass ── */
  --glass-bg:     rgba(255, 255, 255, 0.84);
  --glass-border: rgba(30, 41, 59, 0.08);
  --glass-blur:   16px;

  /* ── Radii ── */
  --radius-sm:   8px;
  --radius-md:   12px;
  --radius-lg:   16px;
  --radius-xl:   20px;
  --radius-full: 999px;

  /* ── Spacing ── */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-7: 28px;
  --space-8: 32px;

  /* ── Easing ── */
  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

  /* ── Z-Index ── */
  --z-base:    1;
  --z-nav:     10;
  --z-modal:   50;
  --z-overlay: 100;
}

/* ═══════════════════════════════════════════════════════════════
   Dark Theme — Semantic Token Remap
   ═══════════════════════════════════════════════════════════════ */
[data-theme="dark"] {
  --color-bg:             #0B0F1A;
  --color-surface:        #141927;
  --color-raised:         #1C2236;
  --color-text:           #E2E8F0;
  --color-text-secondary: #94A3B8;
  --color-text-dim:       #475569;

  --color-border:       rgba(148, 163, 184, 0.12);
  --color-border-focus: rgba(148, 163, 184, 0.24);

  --color-mood-bg:     rgba(37, 99, 235, 0.12);
  --color-sleep-bg:    rgba(124, 58, 237, 0.12);
  --color-med-bg:      rgba(15, 118, 110, 0.12);
  --color-symptom-bg:  rgba(220, 38, 38, 0.12);
  --color-trigger-bg:  rgba(217, 119, 6, 0.12);
  --color-activity-bg: rgba(20, 184, 166, 0.12);

  --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.20);
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.24), 0 1px 2px rgba(0, 0, 0, 0.16);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.28), 0 2px 4px rgba(0, 0, 0, 0.18);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.32), 0 4px 8px rgba(0, 0, 0, 0.20);

  --glass-bg:     rgba(20, 25, 39, 0.80);
  --glass-border: rgba(148, 163, 184, 0.10);
  --glass-blur:   20px;
}

[data-theme="dark"] body::before {
  background:
    radial-gradient(ellipse 80% 60% at 15% 25%, rgba(37, 99, 235, 0.12) 0%, transparent 70%),
    radial-gradient(ellipse 60% 80% at 85% 75%, rgba(15, 118, 110, 0.10) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 50% 15%, rgba(124, 58, 237, 0.08) 0%, transparent 60%);
}

/* ═══════════════════════════════════════════════════════════════
   Layer 2 — Utility Classes
   ═══════════════════════════════════════════════════════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; }

.flex          { display: flex; }
.flex-col      { display: flex; flex-direction: column; }
.items-center  { align-items: center; }
.justify-between { justify-content: space-between; }

.gap-1 { gap: var(--space-1); }
.gap-2 { gap: var(--space-2); }
.gap-3 { gap: var(--space-3); }
.gap-4 { gap: var(--space-4); }
.gap-5 { gap: var(--space-5); }
.gap-6 { gap: var(--space-6); }

.p-1 { padding: var(--space-1); }
.p-2 { padding: var(--space-2); }
.p-3 { padding: var(--space-3); }
.p-4 { padding: var(--space-4); }
.p-5 { padding: var(--space-5); }
.p-6 { padding: var(--space-6); }

.text-xs  { font-size: 11px; }
.text-sm  { font-size: 12px; }
.text-base { font-size: 14px; }
.text-lg  { font-size: 16px; }
.text-xl  { font-size: 20px; }
.text-2xl { font-size: 28px; }

.font-light    { font-weight: 300; }
.font-normal   { font-weight: 400; }
.font-medium   { font-weight: 500; }
.font-semibold { font-weight: 600; }
.font-bold     { font-weight: 700; }

.rounded-sm   { border-radius: var(--radius-sm); }
.rounded-md   { border-radius: var(--radius-md); }
.rounded-lg   { border-radius: var(--radius-lg); }
.rounded-xl   { border-radius: var(--radius-xl); }
.rounded-full { border-radius: var(--radius-full); }

.shadow-xs { box-shadow: var(--shadow-xs); }
.shadow-sm { box-shadow: var(--shadow-sm); }
.shadow-md { box-shadow: var(--shadow-md); }
.shadow-lg { box-shadow: var(--shadow-lg); }

.glass {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
}

.truncate {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.transition { transition: all 0.2s var(--ease-out); }

.grid { display: grid; }
.grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.full-width  { grid-column: 1 / -1; }
.n-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-5); }
@media (max-width: 639px) { .n-grid { grid-template-columns: 1fr; } }
.hidden      { display: none; }
.tabular-nums { font-variant-numeric: tabular-nums; }

/* ═══════════════════════════════════════════════════════════════
   Layer 3 — Component Classes (BEM-lite, n- prefix)
   ═══════════════════════════════════════════════════════════════ */

/* ── Base: Body & App Shell ── */
body {
  background: var(--color-bg);
  color: var(--color-text);
  font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
  font-weight: 400;
  min-height: 100vh;
  transition: background-color 0.4s, color 0.4s;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 25%, rgba(147, 197, 253, 0.30) 0%, transparent 70%),
    radial-gradient(ellipse 60% 80% at 85% 75%, rgba(110, 231, 183, 0.25) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 50% 15%, rgba(186, 230, 253, 0.20) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
  transition: background 0.6s;
}

.n-app {
  position: relative;
  z-index: var(--z-base);
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--space-6);
}

/* ── n-header ── */
.n-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px var(--space-5);
  gap: var(--space-4);
  flex-wrap: wrap;
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-md);
  margin-bottom: 18px;
}

.n-header__brand {
  display: flex;
  align-items: baseline;
  gap: var(--space-2);
}

.n-header__logo {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--color-text);
}

.n-header__subtitle {
  font-size: 14px;
  font-weight: 400;
  color: var(--color-text-secondary);
}

.n-header__actions {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  flex-wrap: wrap;
}

.n-header__session {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.n-header__session img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--color-border);
}

/* ── n-filters ── */
.n-filters {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  flex-wrap: wrap;
  border-radius: var(--radius-xl);
  padding: var(--space-4);
  margin-bottom: 18px;
  box-shadow: var(--shadow-md);
}

.n-filters--signed-out {
  justify-content: space-between;
}

.n-filters__copy {
  display: flex;
  flex-direction: column;
  gap: var(--space-1);
  min-width: 240px;
}

.n-filters__title {
  font-size: 14px;
  font-weight: 600;
  color: var(--color-text);
}

.n-filters__subtitle {
  font-size: 12px;
  line-height: 1.5;
  color: var(--color-text-secondary);
}

.n-filters__field {
  display: flex;
  align-items: center;
  gap: 6px;
}

.n-filters__field label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-text-dim);
  font-weight: 500;
  white-space: nowrap;
}

/* ── n-card ── */
.n-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  box-shadow: var(--shadow-sm);
  animation: n-card-in 0.4s var(--ease-out) both;
}

.n-card:nth-child(1)  { animation-delay: 0.00s; }
.n-card:nth-child(2)  { animation-delay: 0.06s; }
.n-card:nth-child(3)  { animation-delay: 0.12s; }
.n-card:nth-child(4)  { animation-delay: 0.18s; }
.n-card:nth-child(5)  { animation-delay: 0.24s; }
.n-card:nth-child(6)  { animation-delay: 0.30s; }

.n-card--glass {
  background: var(--glass-bg);
  border-color: var(--glass-border);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
}

.n-card__header {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-4);
}

.n-card__icon {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.n-card__title {
  font-size: 14px;
  font-weight: 500;
  color: var(--color-text);
}

.n-card__subtitle {
  font-size: 11px;
  color: var(--color-text-dim);
  margin-top: 1px;
}

/* ── n-btn ── */
.n-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  border: none;
  background: none;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border-radius: var(--radius-md);
  padding: 10px 16px;
  min-height: 44px;
  transition: all 0.18s var(--ease-out);
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}

.n-btn:active {
  transform: scale(0.97);
}

.n-btn--primary {
  background: linear-gradient(135deg, var(--blue-600), var(--teal-700));
  color: #FFFFFF;
  border: none;
  box-shadow: var(--shadow-sm);
}

.n-btn--primary:hover {
  box-shadow: var(--shadow-md);
  filter: brightness(1.05);
}

.n-btn--secondary {
  background: var(--color-surface);
  color: var(--color-text);
  border: 1px solid var(--color-border);
  box-shadow: var(--shadow-xs);
}

.n-btn--secondary:hover {
  border-color: var(--color-border-focus);
  box-shadow: var(--shadow-sm);
}

.n-btn--danger {
  background: none;
  color: var(--red-600);
  border: 1px solid var(--color-border);
}

.n-btn--danger:hover {
  background: var(--color-symptom-bg);
  border-color: rgba(220, 38, 38, 0.20);
}

.n-btn--icon {
  width: 44px;
  height: 44px;
  padding: 0;
  border-radius: var(--radius-md);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  color: var(--color-text-secondary);
}

.n-btn--icon:hover {
  border-color: var(--color-border-focus);
  color: var(--color-text);
  box-shadow: var(--shadow-sm);
}

.n-btn--icon svg {
  width: 20px;
  height: 20px;
}

/* ── n-nav ── */
.n-nav {
  display: none;
  gap: var(--space-2);
  flex-wrap: wrap;
  margin-bottom: 18px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.n-nav::-webkit-scrollbar { display: none; }

.n-nav.active {
  display: flex;
}

.n-nav__pill {
  border: 1px solid rgba(148, 163, 184, 0.22);
  background: var(--glass-bg);
  color: var(--color-text-secondary);
  border-radius: var(--radius-full);
  padding: 10px 14px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  min-height: 44px;
  white-space: nowrap;
  transition: all 0.2s var(--ease-out);
  -webkit-tap-highlight-color: transparent;
}

.n-nav__pill:active {
  transform: scale(0.97);
}

.n-nav__pill.active {
  background: linear-gradient(135deg, rgba(37, 99, 235, 0.14), rgba(15, 118, 110, 0.14));
  color: var(--color-text);
  border-color: rgba(37, 99, 235, 0.28);
}

[data-theme="dark"] .n-nav__pill.active {
  background: linear-gradient(135deg, rgba(37, 99, 235, 0.22), rgba(15, 118, 110, 0.22));
  border-color: rgba(37, 99, 235, 0.36);
}

/* ── n-input ── */
.n-input,
input[type="text"],
input[type="date"],
input[type="time"],
select,
textarea {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  color: var(--color-text);
  font-family: inherit;
  font-size: 15px;
  padding: 12px 14px;
  min-height: 48px;
  outline: none;
  transition: border-color 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out);
  -webkit-appearance: none;
}

.n-input:focus,
input[type="text"]:focus,
input[type="date"]:focus,
input[type="time"]:focus,
select:focus,
textarea:focus {
  border-color: var(--color-border-focus);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
}

input[type="text"] { width: 160px; }
input[type="date"] { width: 160px; }

textarea {
  min-height: 88px;
  resize: vertical;
}

.n-lang-select {
  min-height: 44px;
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 600;
}

/* ── n-badge ── */
.n-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
  font-variant-numeric: tabular-nums;
}

.n-badge--strong {
  background: rgba(220, 38, 38, 0.10);
  color: var(--color-symptom);
}

.n-badge--moderate {
  background: rgba(217, 119, 6, 0.10);
  color: var(--color-trigger);
}

.n-badge--weak {
  background: rgba(15, 118, 110, 0.10);
  color: var(--color-med);
}

/* ── n-pill (info pill) ── */
.n-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 10px;
  border-radius: var(--radius-full);
  background: rgba(248, 250, 252, 0.95);
  border: 1px solid rgba(148, 163, 184, 0.24);
  font-size: 12px;
  color: var(--color-text-secondary);
}

[data-theme="dark"] .n-pill {
  background: rgba(28, 34, 54, 0.80);
  border-color: rgba(148, 163, 184, 0.16);
}

.n-pill strong {
  font-weight: 600;
  color: var(--color-text);
}

/* ── n-sparkline ── */
.n-sparkline {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-2) 0;
  border-bottom: 1px solid var(--color-border);
}

.n-sparkline:last-child {
  border-bottom: none;
}

.n-sparkline__label {
  font-size: 12px;
  color: var(--color-text-secondary);
  width: 80px;
  flex-shrink: 0;
}

.n-sparkline__canvas {
  flex: 1;
  height: 36px;
}

.n-sparkline__value {
  font-size: 13px;
  font-weight: 500;
  width: 48px;
  text-align: right;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

/* ── n-heatmap ── */
.n-heatmap {
  display: grid;
  grid-template-columns: repeat(auto-fill, 14px);
  gap: 3px;
}

.n-heatmap__cell {
  width: 14px;
  height: 14px;
  border-radius: 3px;
  background: var(--color-raised);
  border: 1px solid var(--color-border);
  transition: background-color 0.15s;
}

.n-heatmap__cell--filled {
  background: var(--color-mood);
  border-color: transparent;
}

.n-heatmap__cell--empty {
  background: var(--color-raised);
}

.n-heatmap__cell--missing {
  background: rgba(217, 119, 6, 0.18);
  border-color: rgba(217, 119, 6, 0.24);
}

/* ── n-graph-* ── */
.n-graph-card {
  grid-column: 1 / -1;
  overflow: hidden;
}

.n-graph-intro {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-4);
  margin-bottom: var(--space-4);
  flex-wrap: wrap;
}

.n-graph-intro__copy {
  max-width: 720px;
}

.n-graph-intro__copy strong {
  display: block;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
  color: var(--color-text);
}

.n-graph-intro__copy span {
  font-size: 12px;
  color: var(--color-text-secondary);
  line-height: 1.5;
}

.n-graph-mode-toggle {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
}

.n-graph-stage {
  position: relative;
  background:
    radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 45%),
    radial-gradient(circle at bottom right, rgba(15, 118, 110, 0.08), transparent 40%),
    var(--color-raised);
  border: 1px solid rgba(30, 41, 59, 0.06);
  border-radius: 18px;
  padding: 14px;
  min-height: 560px;
  overflow: hidden;
}

[data-theme="dark"] .n-graph-stage {
  background:
    radial-gradient(circle at top left, rgba(37, 99, 235, 0.10), transparent 45%),
    radial-gradient(circle at bottom right, rgba(15, 118, 110, 0.10), transparent 40%),
    var(--color-raised);
  border-color: rgba(148, 163, 184, 0.08);
}

.n-graph-canvas {
  width: 100%;
  height: 100%;
  min-height: 520px;
  border-radius: 14px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(248, 250, 252, 0.82));
}

[data-theme="dark"] .n-graph-canvas {
  background: linear-gradient(180deg, rgba(20, 25, 39, 0.95), rgba(11, 15, 26, 0.82));
}

.n-graph-shell {
  display: grid;
  grid-template-columns: minmax(0, 1.75fr) minmax(320px, 0.95fr);
  gap: 18px;
  min-height: 560px;
}

.n-graph-panel {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.n-graph-panel-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-4);
  box-shadow: var(--shadow-sm);
}

.n-graph-panel-card h4 {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: var(--space-2);
  color: var(--color-text);
}

.n-graph-panel-card p {
  font-size: 12px;
  color: var(--color-text-secondary);
  line-height: 1.6;
}

.n-graph-selection-title {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}

.n-graph-selection-meta {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
  margin-bottom: var(--space-3);
}

.n-graph-meta-pill {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 8px;
  border-radius: var(--radius-full);
  background: var(--color-raised);
  color: var(--color-text-secondary);
}

.n-graph-callout-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  margin-top: var(--space-3);
}

.n-graph-callout {
  border-left: 3px solid rgba(37, 99, 235, 0.24);
  background: rgba(255, 255, 255, 0.72);
  border-radius: 10px;
  padding: 10px 12px;
}

[data-theme="dark"] .n-graph-callout {
  background: rgba(28, 34, 54, 0.60);
}

.n-graph-callout strong {
  display: block;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 4px;
  color: var(--color-text);
}

.n-graph-callout span {
  display: block;
  font-size: 12px;
  color: var(--color-text-secondary);
  line-height: 1.5;
}

.n-graph-legend {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: var(--space-3);
}

.n-graph-legend__item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--color-text-secondary);
}

.n-graph-legend__swatch {
  width: 10px;
  height: 10px;
  border-radius: var(--radius-full);
  flex-shrink: 0;
}

.n-graph-focus-strip {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: var(--space-4);
}

.n-graph-focus-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-text-dim);
  font-weight: 600;
}

.n-graph-focus-chip {
  border: 1px solid var(--color-border);
  background: var(--color-surface);
  color: var(--color-text-secondary);
  border-radius: var(--radius-full);
  padding: 8px 12px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s var(--ease-out);
  min-height: 44px;
  -webkit-tap-highlight-color: transparent;
}

.n-graph-focus-chip:active {
  transform: scale(0.97);
}

.n-graph-focus-chip.active {
  border-color: rgba(37, 99, 235, 0.24);
  background: rgba(37, 99, 235, 0.08);
  color: var(--color-mood);
  box-shadow: 0 4px 12px rgba(37, 99, 235, 0.12);
}

[data-theme="dark"] .n-graph-focus-chip.active {
  background: rgba(37, 99, 235, 0.16);
}

.n-graph-empty {
  position: absolute;
  inset: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: var(--space-6);
  color: var(--color-text-dim);
  font-size: 13px;
  line-height: 1.6;
  border-radius: 14px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(248, 250, 252, 0.92));
}

[data-theme="dark"] .n-graph-empty {
  background: linear-gradient(180deg, rgba(20, 25, 39, 0.8), rgba(11, 15, 26, 0.92));
}

/* ── n-care-plan-* ── */
.n-care-plan-card {
  grid-column: 1 / -1;
}

.n-care-plan-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.3fr) minmax(280px, 0.9fr);
  gap: 18px;
  margin-top: 14px;
}

.n-care-plan-column {
  display: grid;
  gap: 14px;
}

.n-care-plan-panel {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: var(--glass-bg);
  padding: var(--space-4);
}

.n-care-plan-panel h4 {
  margin: 0 0 var(--space-3);
  font-size: 13px;
  color: var(--color-text);
}

.n-care-plan-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 10px;
}

.n-care-plan-medication-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: var(--space-3);
  border: 1px solid rgba(148, 163, 184, 0.2);
  border-radius: 14px;
  background: rgba(248, 250, 252, 0.92);
  padding: 12px 14px;
}

[data-theme="dark"] .n-care-plan-medication-row {
  background: rgba(28, 34, 54, 0.60);
}

.n-care-plan-medication-row__title {
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text);
}

.n-care-plan-medication-row__note {
  font-size: 12px;
  color: var(--color-text-secondary);
  line-height: 1.5;
  margin-top: 4px;
}

.n-care-plan-empty {
  font-size: 12px;
  color: var(--color-text-secondary);
  line-height: 1.6;
}

/* ── Reminder form & list ── */
.n-reminder-list {
  display: grid;
  gap: 10px;
}

.n-reminder-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: var(--space-3);
  border: 1px solid rgba(148, 163, 184, 0.2);
  border-radius: 14px;
  background: rgba(248, 250, 252, 0.92);
  padding: 12px 14px;
}

[data-theme="dark"] .n-reminder-row {
  background: rgba(28, 34, 54, 0.60);
}

.n-reminder-row__title {
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text);
}

.n-reminder-row__note {
  font-size: 12px;
  color: var(--color-text-secondary);
  line-height: 1.5;
  margin-top: 4px;
}

.n-reminder-row__meta {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
  margin-top: var(--space-2);
}

.n-reminder-row__actions {
  display: inline-flex;
  align-items: flex-start;
  gap: var(--space-2);
}

.n-reminder-form {
  display: grid;
  gap: var(--space-3);
}

.n-reminder-form__row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 120px;
  gap: var(--space-3);
}

.n-reminder-form__actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

/* ── n-voice-* ── */
.n-voice-card {
  grid-column: 1 / -1;
}

.n-voice-shell {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
  gap: 18px;
  margin-top: 14px;
}

.n-voice-panel {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: var(--glass-bg);
  padding: var(--space-4);
}

.n-voice-panel h4 {
  margin: 0 0 10px;
  font-size: 13px;
  color: var(--color-text);
}

.n-voice-status {
  font-size: 13px;
  color: var(--color-text-secondary);
  line-height: 1.6;
  margin-bottom: var(--space-3);
}

.n-voice-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.n-voice-meter {
  margin-top: 14px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.n-voice-note {
  font-size: 12px;
  color: var(--color-text-secondary);
  line-height: 1.6;
  margin-top: var(--space-3);
}

/* ── n-loader ── */
.n-loader {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-4);
}

.n-loader__orb {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    var(--blue-600),
    var(--violet-500),
    var(--teal-500),
    var(--blue-600)
  );
  animation: n-orb-spin 1.2s linear infinite, n-pulse 2s ease-in-out infinite;
}

.n-loader__copy {
  display: grid;
  gap: 4px;
  text-align: center;
}

.n-loader__title {
  font-size: 14px;
  font-weight: 600;
  color: var(--color-text);
}

.n-loader__subtitle {
  font-size: 12px;
  color: var(--color-text-secondary);
}

.n-overlay {
  position: fixed;
  inset: 0;
  background: rgba(248, 250, 252, 0.70);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  z-index: var(--z-overlay);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.n-overlay:not(.active) {
  display: none;
}

[data-theme="dark"] .n-overlay {
  background: rgba(11, 15, 26, 0.70);
}

/* ── n-skeleton ── */
.n-skeleton {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--space-5);
  width: 100%;
}

.n-skeleton__card {
  min-height: 180px;
  border-radius: var(--radius-lg);
  border: 1px solid rgba(30, 41, 59, 0.06);
  background: linear-gradient(110deg, rgba(241, 245, 249, 0.85) 8%, rgba(255, 255, 255, 0.95) 18%, rgba(241, 245, 249, 0.85) 33%);
  background-size: 220% 100%;
  animation: n-shimmer 1.5s linear infinite;
  box-shadow: var(--shadow-sm);
}

[data-theme="dark"] .n-skeleton__card {
  border-color: rgba(148, 163, 184, 0.06);
  background: linear-gradient(110deg, rgba(28, 34, 54, 0.85) 8%, rgba(20, 25, 39, 0.95) 18%, rgba(28, 34, 54, 0.85) 33%);
  background-size: 220% 100%;
}

.n-skeleton__card--wide {
  grid-column: 1 / -1;
  min-height: 320px;
}

/* ── n-empty ── */
.n-empty {
  text-align: center;
  padding: 80px var(--space-5);
  grid-column: 1 / -1;
}

.n-empty__orb {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 40%, rgba(37, 99, 235, 0.15), rgba(15, 118, 110, 0.08));
  border: 1px solid rgba(37, 99, 235, 0.12);
  margin: 0 auto var(--space-4);
  animation: n-pulse 4s ease-in-out infinite;
}

.n-empty__text {
  font-size: 14px;
  color: var(--color-text-dim);
  line-height: 1.6;
}

.n-empty__text strong {
  color: var(--color-text-secondary);
  font-weight: 500;
}

/* ── n-summary ── */
.n-summary {
  display: flex;
  gap: var(--space-6);
  margin-bottom: var(--space-5);
  flex-wrap: wrap;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  padding: 18px var(--space-5);
  box-shadow: var(--shadow-md);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
}

.n-summary__stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.n-summary__value {
  font-family: 'DM Sans', sans-serif;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.n-summary__label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--color-text-dim);
  font-weight: 500;
}

/* ── Consistency card ── */
.n-consistency {
  grid-column: 1 / -1;
}

.n-consistency__grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: var(--space-3);
  margin-bottom: var(--space-4);
}

.n-consistency__stat {
  padding: 14px;
  border-radius: 14px;
  background: var(--color-raised);
  border: 1px solid rgba(30, 41, 59, 0.06);
}

[data-theme="dark"] .n-consistency__stat {
  border-color: rgba(148, 163, 184, 0.08);
}

.n-consistency__value {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
}

.n-consistency__label {
  margin-top: 4px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-text-dim);
  font-weight: 600;
}

.n-consistency__note {
  font-size: 12px;
  color: var(--color-text-secondary);
  line-height: 1.6;
}

.n-consistency__missing-list {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
  margin-top: var(--space-2);
}

.n-consistency__missing-pill {
  padding: 7px 10px;
  border-radius: var(--radius-full);
  background: rgba(217, 119, 6, 0.10);
  color: var(--color-trigger);
  font-size: 12px;
  font-weight: 600;
}

/* ── Correlation items ── */
.n-correlation {
  padding: var(--space-3) 0;
  border-bottom: 1px solid var(--color-border);
}

.n-correlation:last-child { border-bottom: none; }

.n-correlation__pair {
  font-size: 13px;
  font-weight: 500;
  color: var(--color-text);
  margin-bottom: 4px;
}

.n-correlation__detail {
  font-size: 12px;
  color: var(--color-text-secondary);
  line-height: 1.5;
}

/* ── Trigger bars ── */
.n-trigger-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
}

.n-trigger-row__name {
  font-size: 12px;
  color: var(--color-text-secondary);
  width: 100px;
  flex-shrink: 0;
  text-transform: capitalize;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.n-trigger-row__bar-container {
  flex: 1;
  height: 20px;
  background: var(--color-raised);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.n-trigger-row__bar {
  height: 100%;
  border-radius: 4px;
  transition: width 0.6s var(--ease-out);
  min-width: 4px;
}

.n-trigger-row__count {
  font-size: 11px;
  color: var(--color-text-dim);
  width: 50px;
  text-align: right;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

/* ── Causal items ── */
.n-causal-item {
  padding: var(--space-3) 0;
  border-bottom: 1px solid var(--color-border);
}

.n-causal-item:last-child { border-bottom: none; }

.n-causal-item__row {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: 6px;
}

.n-causal-item__name {
  font-size: 13px;
  font-weight: 500;
  text-transform: capitalize;
}

.n-causal-item__severity-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

.n-causal-item__severity-badge--high   { background: rgba(220, 38, 38, 0.10); color: var(--color-symptom); }
.n-causal-item__severity-badge--med    { background: rgba(217, 119, 6, 0.10); color: var(--color-trigger); }
.n-causal-item__severity-badge--low    { background: rgba(15, 118, 110, 0.10); color: var(--color-med); }

.n-causal-item__causes {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding-left: var(--space-3);
  border-left: 2px solid rgba(220, 38, 38, 0.20);
}

.n-causal-item__cause {
  font-size: 12px;
  color: var(--color-text-secondary);
  line-height: 1.5;
  padding-left: var(--space-2);
  position: relative;
}

.n-causal-item__cause::before {
  content: '';
  position: absolute;
  left: -2px;
  top: 7px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--color-symptom);
  opacity: 0.5;
}

/* ── Invite banner ── */
.n-invite {
  background: var(--color-surface);
  border: 1px solid rgba(37, 99, 235, 0.15);
  border-radius: var(--radius-lg);
  padding: var(--space-6);
  margin-bottom: var(--space-5);
  text-align: center;
  box-shadow: var(--shadow-md);
}

.n-invite h3 {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: var(--space-2);
}

.n-invite p {
  font-size: 13px;
  color: var(--color-text-secondary);
  margin-bottom: var(--space-4);
}

.n-invite__perms {
  display: flex;
  gap: 6px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: var(--space-3);
}

.n-invite__perm-tag {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 6px;
  background: rgba(37, 99, 235, 0.08);
  color: var(--color-mood);
  font-weight: 500;
}

/* ── Auth ── */
.n-auth {
  text-align: center;
  padding: 80px var(--space-5);
}

.n-auth .n-empty__text {
  margin-bottom: var(--space-6);
}

.n-sign-in-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--color-surface);
  color: var(--color-text);
  font-family: inherit;
  font-size: 16px;
  font-weight: 500;
  padding: 14px 28px;
  min-height: 56px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  cursor: pointer;
  box-shadow: var(--shadow-md);
  transition: box-shadow 0.2s var(--ease-out);
  -webkit-tap-highlight-color: transparent;
}

.n-sign-in-btn:hover {
  box-shadow: var(--shadow-lg);
}

.n-sign-in-btn svg {
  width: 18px;
  height: 18px;
}

/* ── User bar ── */
.n-user-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--color-text-secondary);
}

.n-user-bar img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--color-border);
}

.n-sign-out-btn {
  background: none;
  border: 1px solid var(--color-border);
  border-radius: 10px;
  color: var(--color-text-secondary);
  font-family: inherit;
  font-size: 14px;
  padding: 10px 16px;
  min-height: 44px;
  cursor: pointer;
  transition: all 0.2s var(--ease-out);
  -webkit-tap-highlight-color: transparent;
}

.n-sign-out-btn:hover {
  border-color: var(--color-border-focus);
  color: var(--color-text);
}

/* ── Page containers ── */
.n-page {
  display: none;
  opacity: 0;
  transform: translateY(12px);
}

.n-page.active {
  display: block;
  animation: n-fade-in 0.4s var(--ease-out) both;
}

/* ── No data ── */
.n-no-data {
  font-size: 13px;
  color: var(--color-text-dim);
  font-style: italic;
  padding: var(--space-4) 0;
  text-align: center;
}

/* ═══════════════════════════════════════════════════════════════
   Animations
   ═══════════════════════════════════════════════════════════════ */
@keyframes n-fade-in {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes n-card-in {
  from { opacity: 0; transform: translateY(16px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes n-spin {
  to { transform: rotate(360deg); }
}

@keyframes n-pulse {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50%      { transform: scale(1.08); opacity: 1; }
}

@keyframes n-shimmer {
  to { background-position-x: -220%; }
}

@keyframes n-orb-spin {
  to { transform: rotate(360deg); }
}

/* ═══════════════════════════════════════════════════════════════
   Responsive — Mobile First
   ═══════════════════════════════════════════════════════════════ */
@media (max-width: 639px) {
  .n-app {
    padding: var(--space-4);
  }

  .n-header {
    flex-direction: column;
    align-items: stretch;
    gap: var(--space-3);
  }

  .n-header__actions {
    flex-direction: column;
    gap: 10px;
  }

  .n-header__session {
    justify-content: center;
  }

  .n-filters {
    flex-direction: column;
    align-items: stretch;
  }

  .n-filters__field {
    width: 100%;
  }

  .n-filters__field input,
  .n-filters select {
    width: 100%;
  }

  .n-nav {
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: var(--space-1);
  }

  .n-summary {
    justify-content: center;
  }

  .n-graph-shell {
    grid-template-columns: 1fr;
    min-height: 0;
  }

  .n-graph-stage {
    min-height: 420px;
  }

  .n-graph-canvas {
    min-height: 380px;
  }

  .n-graph-intro {
    align-items: flex-start;
  }

  .n-care-plan-grid,
  .n-voice-shell,
  .n-reminder-form__row {
    grid-template-columns: 1fr;
  }

  .n-reminder-row {
    grid-template-columns: 1fr;
  }

  .n-reminder-row__actions {
    justify-content: flex-start;
  }

  .n-skeleton {
    grid-template-columns: 1fr;
  }

  .n-consistency__grid {
    grid-template-columns: 1fr;
  }

  .n-sign-out-btn {
    width: 100%;
    text-align: center;
  }

  .n-btn--primary,
  .n-btn--secondary {
    width: 100%;
    justify-content: center;
  }
}

@media (min-width: 640px) and (max-width: 1023px) {
}

@media (min-width: 1024px) {

  .n-graph-shell {
    grid-template-columns: minmax(0, 1.75fr) minmax(320px, 0.95fr);
  }

  .n-care-plan-grid {
    grid-template-columns: minmax(0, 1.3fr) minmax(280px, 0.9fr);
  }

  .n-voice-shell {
    grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
  }
}

/* ── Touch target enforcement ── */
@media (hover: none) {
  .n-btn:hover,
  .n-btn--primary:hover,
  .n-btn--secondary:hover,
  .n-btn--danger:hover,
  .n-btn--icon:hover,
  .n-nav__pill:hover,
  .n-graph-focus-chip:hover,
  .n-sign-in-btn:hover,
  .n-sign-out-btn:hover {
    box-shadow: inherit;
    filter: none;
    border-color: inherit;
    color: inherit;
    background: inherit;
  }
}

// ── Members + Data Loading ──
async function fetchMembers() {
  try {
    await getToken();
    const res = await fetch('/api/dashboard/me', { headers: authHeaders() });
    if (!res.ok) throw new Error(`${res.status}`);
    const data = await res.json();
    members = data.members || [];
    selfId = data.selfId;
    const select = document.getElementById('memberSelect');
    if (!select) return;
    select.innerHTML = '';
    if (members.length === 0 && selfId) {
      const opt = document.createElement('option'); opt.value = selfId; opt.textContent = I18n.t('member_self'); select.appendChild(opt);
    }
    for (const m of members) {
      const opt = document.createElement('option'); opt.value = m.memberId; opt.textContent = m.memberName || m.memberId; select.appendChild(opt);
    }
    if (members.length === 0 && !selfId) select.innerHTML = `<option value="">${escapeHtml(I18n.t('member_none'))}</option>`;
    selectedMemberId = select.value;
    if (selectedMemberId) await loadDashboard();
    else { isBootstrapping = false; setLoadingState(false); clearDashboard('no_members'); }
  } catch (err) {
    console.error('Failed to fetch members:', err);
    isBootstrapping = false; setLoadingState(false);
    showError(I18n.t('error_load'), I18n.t('error_load_desc'));
  }
}

async function fetchMemberReminders(memberId, headers) {
  const res = await fetch(`/api/caregiver/members/${memberId}/reminders`, { headers });
  if (res.status === 403 || res.status === 404) return null;
  if (!res.ok) throw new Error(`Reminder API error: ${res.status}`);
  return res.json();
}

async function loadDashboard() {
  const select = document.getElementById('memberSelect');
  if (select?.value) selectedMemberId = select.value;
  const userId = selectedMemberId;
  if (!userId) return;
  const startEl = document.getElementById('startDate');
  const endEl = document.getElementById('endDate');
  const start = startEl ? startEl.value : fmt(sevenAgo);
  const end = endEl ? endEl.value : fmt(today);
  activeRange = { start, end };
  await getToken();
  const params = new URLSearchParams({ userId, start, end });
  const headers = authHeaders();
  if (isBootstrapping) setLoadingState(true, I18n.t('loading_refresh_title'), I18n.t('loading_refresh_subtitle'));
  else { renderDashboardSkeleton(); setLoadingState(true, I18n.t('loading_insights_title'), I18n.t('loading_insights_subtitle')); }
  try {
    const [tsRes, corrRes, trigRes, causalRes, graphRes, reminders] = await Promise.all([
      fetch(`/api/dashboard/time-series?${params}`, { headers }),
      fetch(`/api/dashboard/correlations?${params}`, { headers }),
      fetch(`/api/dashboard/triggers?${params}`, { headers }),
      fetch(`/api/dashboard/causal?${params}`, { headers }),
      fetch(`/api/dashboard/graph?${params}`, { headers }),
      fetchMemberReminders(userId, headers),
    ]);
    if (!tsRes.ok || !corrRes.ok || !trigRes.ok || !causalRes.ok || !graphRes.ok) {
      const failedRes = [tsRes, corrRes, trigRes, causalRes, graphRes].find(r => !r.ok);
      if (failedRes?.status === 403) throw new Error('Access denied.');
      throw new Error(`API error: ${failedRes?.status}`);
    }
    const [timeSeries, correlations, triggers, causal, graph] = await Promise.all([tsRes.json(), corrRes.json(), trigRes.json(), causalRes.json(), graphRes.json()]);
    const normalizedSeries = normalizeTimeSeriesRange(timeSeries, start, end);
    currentDashboardData = { timeSeries: normalizedSeries, correlations, triggers, causal, graph, reminders };
    renderActivePage();
  } catch (err) {
    console.error('Failed to load dashboard:', err);
    showError(I18n.t('failed_load'), err.message);
  } finally { isBootstrapping = false; setLoadingState(false); }
}

// ── Invite flow ──
async function checkInviteToken() {
  const inviteToken = new URLSearchParams(window.location.search).get('invite');
  if (!inviteToken) return;
  try {
    const res = await fetch(`/api/caregiver/invitation/${inviteToken}`, { headers: authHeaders() });
    if (!res.ok) { if (res.status === 404) showInviteError(I18n.t('invite_invalid')); return; }
    const invite = await res.json();
    if (invite.status !== 'pending') { showInviteError(`This invitation has already been ${invite.status}.`); return; }
    showInviteBanner(invite, inviteToken);
  } catch (err) { console.error('Failed to check invite:', err); }
}

function showInviteBanner(invite, token) {
  const permLabels = { medications: I18n.t('perm_medications'), reminders: I18n.t('perm_reminders'), schedule: I18n.t('perm_schedule'), wellness: I18n.t('perm_wellness') };
  const banner = document.getElementById('inviteBanner');
  banner.style.display = 'block';
  banner.className = 'n-invite';
  banner.innerHTML = `<h3>${escapeHtml(I18n.t('invited'))}</h3><p>${escapeHtml(I18n.t('invited_desc'))}</p>
    <div class="n-invite__perms">${invite.permissions.map(p => `<span class="n-badge n-badge--weak">${escapeHtml(permLabels[p] || p)}</span>`).join('')}</div>
    <button class="n-btn n-btn--primary" id="acceptInviteBtn">${escapeHtml(I18n.t('accept_invite'))}</button>`;
  document.getElementById('acceptInviteBtn').onclick = async () => {
    const btn = document.getElementById('acceptInviteBtn');
    btn.disabled = true; btn.textContent = I18n.t('accepting');
    try {
      const res = await fetch(`/api/caregiver/invitation/${token}/accept`, { method: 'POST', headers: authHeaders() });
      if (!res.ok) { const err = await res.json(); throw new Error(err.error || `Error ${res.status}`); }
      banner.innerHTML = `<h3>${escapeHtml(I18n.t('invite_accepted'))}</h3><p>${escapeHtml(I18n.t('invite_accepted_desc'))}</p>`;

function renderActivePage() {
  if (!currentDashboardData) return;
  const data = currentDashboardData;
  const { timeSeries, correlations, triggers, causal, graph, reminders } = data;
  const page = activeDashboardPage;

  const hasTrends = timeSeries.dates?.length > 0;
  const hasCausal = causal?.length > 0;
  const hasSymptoms = timeSeries.symptomSeries && Object.keys(timeSeries.symptomSeries).length > 0;
  const hasGraph = graph && Array.isArray(graph.nodes) && graph.nodes.length > 0;

  // Render nav
  renderPageNav();

  // Hide empty state
  document.getElementById('emptyState').style.display = 'none';

  if (!hasTrends && !hasCausal && !hasGraph) {
    const empty = document.getElementById('emptyState');
    empty.style.display = '';
    empty.innerHTML = `<div class="n-empty__orb"></div><div class="n-empty__text"><strong>${escapeHtml(I18n.t('no_data_range'))}</strong><br>${escapeHtml(I18n.t('no_data_range_desc'))}</div>`;
    document.getElementById('summaryBar').style.display = 'none';
    PAGES.forEach(p => { const el = document.getElementById('page-' + p); if (el) { el.innerHTML = ''; el.classList.remove('active'); } });
    return;
  }

  // Clear and render pages
  PAGES.forEach(p => {
    const el = document.getElementById('page-' + p);
    if (el) { el.innerHTML = ''; el.classList.toggle('active', p === page); }
  });

  const target = document.getElementById('page-' + page);
  if (!target) return;
  const grid = document.createElement('div');
  grid.className = 'n-grid';

  if (page === 'checkins') {
    renderSummaryBar(data);
    if (hasTrends) { grid.appendChild(buildConsistencyCard(timeSeries)); grid.appendChild(buildTrendsCard(timeSeries)); }
    if (hasSymptoms) grid.appendChild(buildSymptomCard(timeSeries));
    if (hasCausal) grid.appendChild(buildCausalCard(causal));
  } else {
    document.getElementById('summaryBar').style.display = 'none';
    if (page === 'causal') {
      if (hasGraph) grid.appendChild(buildGraphExperienceCard(graph, correlations));
      else grid.appendChild(buildPlaceholderCard(I18n.t('graph_no_data'), I18n.t('graph_no_data_desc')));
    } else if (page === 'care-plan') {
      if (reminders) grid.appendChild(buildReminderSetupCard(reminders));
      else grid.appendChild(buildPlaceholderCard(I18n.t('care_plan_unavail'), I18n.t('care_plan_unavail_desc')));
    } else if (page === 'messages') {
      grid.appendChild(buildVoiceMessagesCard());
    }
  }

  target.appendChild(grid);
  requestAnimationFrame(() => { document.querySelectorAll('[data-sparkline]').forEach(drawSparkline); });
}

  const nav = document.getElementById('pageNav');
  nav.innerHTML = '';

function renderSummaryBar(data) {
  const summaryBar = document.getElementById('summaryBar');
  const ts = data.timeSeries;
  if (!ts.dates?.length) { summaryBar.style.display = 'none'; return; }
  const days = ts.dates.length;
  const avgMood = average(ts.moodSeries);
  const avgSleep = average(ts.sleepHoursSeries);
  const avgAdherence = average(ts.medAdherenceSeries);
  const loggedDays = days - (ts.missingDates?.length || 0);
  summaryBar.innerHTML = `
    <div class="n-summary__stat"><div class="n-summary__value">${days}</div><div class="n-summary__label">${escapeHtml(I18n.t('days_in_range'))}</div></div>
    <div class="n-summary__stat"><div class="n-summary__value">${loggedDays}</div><div class="n-summary__label">${escapeHtml(I18n.t('checkins_logged'))}</div></div>
    ${avgMood !== null ? `<div class="n-summary__stat"><div class="n-summary__value" style="color:${COLORS.mood.text}">${avgMood.toFixed(1)}</div><div class="n-summary__label">${escapeHtml(I18n.t('avg_mood'))}</div></div>` : ''}
    ${avgSleep !== null ? `<div class="n-summary__stat"><div class="n-summary__value" style="color:${COLORS.sleep.text}">${avgSleep.toFixed(1)}h</div><div class="n-summary__label">${escapeHtml(I18n.t('avg_sleep'))}</div></div>` : ''}
    ${avgAdherence !== null ? `<div class="n-summary__stat"><div class="n-summary__value" style="color:${COLORS.med.text}">${Math.round(avgAdherence * 100)}%</div><div class="n-summary__label">${escapeHtml(I18n.t('med_adherence'))}</div></div>` : ''}`;
  summaryBar.style.display = 'flex';
}

// ── Card builders ──
function makeCard(title, subtitle, iconColor, iconBg) {
  const card = document.createElement('div');
  card.className = 'n-card';
  card.innerHTML = `<div class="n-card__header"><div class="n-card__icon" style="background:${iconBg};color:${iconColor};">&#9679;</div><div><div class="n-card__title">${escapeHtml(title)}</div><div class="n-card__subtitle">${escapeHtml(subtitle)}</div></div></div>`;
  return card;
}

function buildPlaceholderCard(title, body) {
  const card = makeCard(title, body, '#64748B', 'rgba(148,163,184,0.12)');
  card.classList.add('full-width');
  return card;
}

function buildConsistencyCard(ts) {
  const missingDates = Array.isArray(ts.missingDates) ? ts.missingDates : [];
  const totalDays = ts.dates?.length || 0;
  const loggedDays = Math.max(0, totalDays - missingDates.length);
  const pct = totalDays > 0 ? Math.round((loggedDays / totalDays) * 100) : 0;
  const card = makeCard(I18n.t('consistency_title'), I18n.t('consistency_desc'), '#0F766E', 'rgba(15,118,110,0.08)');
  card.classList.add('full-width');
  const stats = document.createElement('div');
  stats.className = 'n-consistency__grid';
  stats.innerHTML = `
    <div class="n-consistency__stat"><div class="n-consistency__value">${totalDays}</div><div class="n-consistency__label">${escapeHtml(I18n.t('days_monitored'))}</div></div>
    <div class="n-consistency__stat"><div class="n-consistency__value">${loggedDays}</div><div class="n-consistency__label">${escapeHtml(I18n.t('days_with_checkins'))}</div></div>
    <div class="n-consistency__stat"><div class="n-consistency__value">${missingDates.length}</div><div class="n-consistency__label">${escapeHtml(I18n.t('missing_days'))}</div></div>
    <div class="n-consistency__stat"><div class="n-consistency__value">${pct}%</div><div class="n-consistency__label">${escapeHtml(I18n.t('coverage'))}</div></div>`;
  card.appendChild(stats);
  const note = document.createElement('div');
  note.className = 'n-consistency__note';
  note.textContent = missingDates.length === 0 ? I18n.t('no_missed') : I18n.t('missed_note');
  card.appendChild(note);
  // Heatmap grid
  const heatmap = document.createElement('div');
  heatmap.className = 'n-heatmap';
  const missingSet = new Set(missingDates);
  (ts.dates || []).forEach(date => {
    const cell = document.createElement('div');
    cell.className = 'n-heatmap__cell ' + (missingSet.has(date) ? 'n-heatmap__cell--empty' : 'n-heatmap__cell--filled');
    cell.title = prettyDate(date);
    heatmap.appendChild(cell);
  });
  card.appendChild(heatmap);
  return card;
}

// ── Graph ──
function buildGraphExperienceCard(graphData, correlations) {
  const card = makeCard(I18n.t('graph_title'), I18n.t('graph_desc'), '#0F766E', 'rgba(13,148,136,0.08)');
  card.classList.add('full-width', 'n-graph-card');
  const intro = document.createElement('div');
  intro.className = 'n-graph-intro';
  intro.innerHTML = `<div class="n-graph-intro__copy"><strong>${escapeHtml(I18n.t('graph_story'))}</strong><span>${escapeHtml(I18n.t('graph_story_desc'))}</span></div>`;
  card.appendChild(intro);
  const focusStrip = document.createElement('div');
  focusStrip.className = 'n-graph-focus-strip';
  card.appendChild(focusStrip);
  const shell = document.createElement('div');
  shell.className = 'n-graph-shell';
  const stage = document.createElement('div');
  stage.className = 'n-graph-stage';
  const canvas = document.createElement('div');
  canvas.className = 'n-graph-canvas';
  stage.appendChild(canvas);
  shell.appendChild(stage);
  const panel = document.createElement('div');

function mountGraphExperience({ graphData, focusStrip, stage, canvas, panel }) {
  const traceCatalog = buildTraceCatalog(graphData);
  if (!traceCatalog.hasData) {
    stage.appendChild(buildGraphEmpty(I18n.t('graph_empty_detail')));
    panel.appendChild(buildGraphInfoCard(I18n.t('graph_how'), I18n.t('graph_how_works')));
    return;
  }
  let currentFocusId = traceCatalog.defaultFocusId;
  let cy = null;

  const renderFocusStrip_ = () => {
    focusStrip.innerHTML = '';
    const label = document.createElement('div');
    label.className = 'n-graph-focus-label';
    label.textContent = traceCatalog.focusItems.length > 0 ? I18n.t('graph_focus') : I18n.t('graph_connected');
    focusStrip.appendChild(label);
    traceCatalog.focusItems.forEach(item => {
      const btn = document.createElement('button');
      btn.className = `n-graph-focus-chip${item.id === currentFocusId ? ' active' : ''}`;
      btn.textContent = item.label;
      btn.onclick = () => { currentFocusId = item.id; renderFocusStrip_(); renderGraph_(); };
      focusStrip.appendChild(btn);
    });
  };

  const focusGraphNode = (nodeId) => {
    if (!cy || !nodeId) return;
    const node = cy.getElementById(nodeId);
    if (!node || node.empty()) return;
    cy.elements().unselect();
    node.select();
    // Dim non-focused, center without zoom
    cy.nodes().forEach(n => { n.style('opacity', n.id() === nodeId || n.edgesWith(node).length > 0 ? 1 : 0.25); });
    cy.edges().forEach(e => { e.style('opacity', e.source().id() === nodeId || e.target().id() === nodeId ? 1 : 0.15); });
    cy.animate({ center: { eles: node }, duration: 300 });
    renderSelectionPanel_();
  };

  const renderSelectionPanel_ = () => {
    panel.innerHTML = '';
    panel.appendChild(buildGraphInfoCard(I18n.t('graph_how'), I18n.t('graph_how_desc')));
    if (!cy || cy.elements().length === 0) { panel.appendChild(buildGraphInfoCard(I18n.t('graph_nothing_selected'), I18n.t('graph_nothing_selected_desc'))); return; }
    const selected = getFocusedNode(cy, currentFocusId);
    if (!selected) { panel.appendChild(buildGraphInfoCard(I18n.t('graph_nothing_selected'), I18n.t('graph_nothing_selected_desc'))); return; }
    const details = buildSelectionDetails(cy, selected);
    panel.appendChild(details.primary);
    panel.appendChild(details.secondary);
  };

  const renderGraph_ = () => {
    stage.querySelector('.n-graph-empty')?.remove();
    if (cy) cy.destroy();
    const traceModel = traceCatalog.build(currentFocusId);
    if (traceModel.elements.length === 0) { stage.appendChild(buildGraphEmpty(I18n.t('graph_no_paths'))); renderSelectionPanel_(); return; }
    cy = cytoscape({
      container: canvas,
      elements: traceModel.elements,
      layout: traceModel.layout,
      style: graphStyles(),
      minZoom: 0.4, maxZoom: 2.5, wheelSensitivity: 0.3,
    });
    cy.on('tap', 'node', (event) => {
      const nextKey = event.target.data('focusKey');
      if (nextKey) { currentFocusId = nextKey; renderFocusStrip_(); }
      // Reset opacity
      cy.nodes().style('opacity', 1);
      cy.edges().style('opacity', 1);
      renderSelectionPanel_();
    });
    cy.on('tap', 'edge', () => renderSelectionPanel_());
    renderSelectionPanel_();
    if (currentFocusId) {
      const nid = `trace-symptom-${sanitizeMetricKey(currentFocusId)}`;
      focusGraphNode(nid);
    }
  };
  renderFocusStrip_();
  renderGraph_();
}

function getFocusedNode(cy, currentFocusId) {
  const selected = cy.$('node:selected')[0];
  if (selected) return selected;
  if (currentFocusId) { const f = cy.getElementById(currentFocusId); if (f?.length > 0) return f[0]; }
  return cy.nodes()[0] || null;
}

function buildTraceCatalog(graphData) {
  const nodes = Array.isArray(graphData?.nodes) ? graphData.nodes : [];
  const edges = Array.isArray(graphData?.edges) ? graphData.edges : [];
  const dayNodes = nodes.filter(n => n.type === 'Day').sort((a, b) => (a.data?.date || '').localeCompare(b.data?.date || ''));
  const nodeById = new Map(nodes.map(n => [n.id, n]));
  const eventEdges = edges.filter(e => e.type === 'ON_DAY' || e.type === 'TRIGGERED_ON');
  const nodeDayMap = new Map();
  eventEdges.forEach(e => nodeDayMap.set(e.source, e.target));
  const dayEvents = new Map();
  nodes.filter(n => n.type !== 'Day' && n.type !== 'PatternMetric').forEach(n => {
    const dayId = nodeDayMap.get(n.id); if (!dayId) return;
    if (!dayEvents.has(dayId)) dayEvents.set(dayId, []);
    dayEvents.get(dayId).push(n);
  });
  const symptomGroupMap = new Map();
  nodes.filter(n => n.type === 'Symptom').forEach(n => {
    const dayId = nodeDayMap.get(n.id); if (!dayId) return;
    const symptomType = String(n.data?.type || n.label || 'symptom').toLowerCase();
    const groupKey = `${dayId}:${symptomType}`;
    if (!symptomGroupMap.has(groupKey)) symptomGroupMap.set(groupKey, { id: `focus-${sanitizeMetricKey(groupKey)}`, dayId, label: symptomType, symptomType, severity: 0, memberIds: [], date: nodeById.get(dayId)?.data?.date || '' });
    const g = symptomGroupMap.get(groupKey);
    g.memberIds.push(n.id);
    g.severity = Math.max(g.severity, Number(n.data?.severity || 0));
  });
  const causalEdges = edges.filter(e => e.type === 'LIKELY_CAUSED_BY' || e.type === 'WORSENED_BY');
  const focusItems = Array.from(symptomGroupMap.values()).map(g => {
    const outgoing = causalEdges.filter(e => g.memberIds.includes(e.source)).length;
    return { ...g, score: outgoing * 10 + g.severity, label: `${prettyDate(g.date)} · ${capitalize(g.label)} ${g.severity}/5` };
  }).sort((a, b) => b.score - a.score || String(b.date).localeCompare(String(a.date))).slice(0, 6);

  const build = (focusId) => {
    const focus = focusItems.find(i => i.id === focusId) || focusItems[0];
    if (!focus) return { elements: [], layout: { name: 'dagre', rankDir: 'TB', nodeSep: 60, rankSep: 100, animate: true, animationDuration: 400, fit: true, padding: 60 } };
    const focusDayId = focus.dayId;
    const involvedDays = new Set([focusDayId]);
    const groupedContributorMap = new Map();
    causalEdges.forEach(edge => {
      if (!focus.memberIds.includes(edge.source)) return;
      const causeNode = nodeById.get(edge.target); if (!causeNode) return;
      const causeDayId = nodeDayMap.get(causeNode.id); if (!causeDayId) return;
      involvedDays.add(causeDayId);
      const aggregateKey = `${causeDayId}:${causeNode.type}:${prettifyNodeLabel(causeNode)}`;
      if (!groupedContributorMap.has(aggregateKey)) groupedContributorMap.set(aggregateKey, { id: `cause-${sanitizeMetricKey(aggregateKey)}`, type: causeNode.type, label: prettifyNodeLabel(causeNode), dayId: causeDayId, sourceNode: causeNode, confidence: Number(edge.data?.confidence || 0), detail: edge.data?.detail || '', reason: edge.data?.reason || '', edgeType: edge.type, count: 0 });
      const c = groupedContributorMap.get(aggregateKey);
      c.count += 1; c.confidence = Math.max(c.confidence, Number(edge.data?.confidence || 0));
      if (!c.detail && edge.data?.detail) c.detail = edge.data.detail;
    });
    const orderedDays = dayNodes.filter(d => involvedDays.has(d.id));
    const elements = [];
    const includedDayIds = new Set(orderedDays.map(d => d.id));
    orderedDays.forEach(day => {
      elements.push({ data: { id: day.id, label: day.label, type: day.type, date: day.data?.date, overallScore: day.data?.overallScore } });
    });
    const focusNodeId = `trace-symptom-${sanitizeMetricKey(focus.id)}`;
    elements.push({ data: { id: focusNodeId, label: `${capitalize(focus.label.split(' · ').pop().split(' ')[0])} ${focus.severity}/5`, type: 'Symptom', severity: focus.severity, date: focus.date, symptomType: focus.symptomType, count: focus.memberIds.length, focusKey: focus.id } });
    elements.push({ data: { id: `trace-focus-day-${focusDayId}`, source: focusDayId, target: focusNodeId, type: 'ON_DAY', label: 'Occurred on' } });
    Array.from(groupedContributorMap.values()).sort((a, b) => String(a.dayId).localeCompare(String(b.dayId)) || a.label.localeCompare(b.label)).forEach(item => {
      if (!includedDayIds.has(item.dayId)) return;
      const contributorLabel = item.count > 1 ? `${item.label} ×${item.count}` : item.label;
      elements.push({ data: { id: item.id, label: contributorLabel, type: item.type, date: nodeById.get(item.dayId)?.data?.date, confidence: item.confidence, detail: item.detail || `${contributorLabel} was linked to this symptom change.`, reason: item.reason, ...item.sourceNode.data } });
      elements.push({ data: { id: `trace-day-link-${item.dayId}-${item.id}`, source: item.dayId, target: item.id, type: item.type === 'Trigger' ? 'TRIGGERED_ON' : 'ON_DAY', label: 'Captured on' } });
      elements.push({ data: { id: `trace-cause-${item.id}-${focusNodeId}`, source: item.id, target: focusNodeId, type: item.edgeType, confidence: item.confidence, detail: item.detail, reason: item.reason, label: item.edgeType === 'LIKELY_CAUSED_BY' ? 'Likely contributor' : 'May have worsened' } });
    });
    for (let i = 0; i < orderedDays.length - 1; i++) {
      elements.push({ data: { id: `trace-next-${orderedDays[i].id}-${orderedDays[i + 1].id}`, source: orderedDays[i].id, target: orderedDays[i + 1].id, type: 'NEXT_DAY', label: 'Next day' } });
    }
    return { elements, layout: { name: 'dagre', rankDir: 'TB', nodeSep: 60, rankSep: 100, edgeSep: 20, animate: true, animationDuration: 400, fit: true, padding: 60 } };
  };
  return { hasData: focusItems.length > 0 || dayNodes.length > 0, focusItems, defaultFocusId: focusItems[0]?.id || null, build };
}

function buildSelectionDetails(cy, selectedNode) {
  const data = selectedNode.data();
  const primary = document.createElement('div');
  primary.className = 'n-graph-panel-card';
  primary.innerHTML = `<div class="n-graph-selection-title">${escapeHtml(data.label || data.type || 'Selected')}</div>
    <div class="n-graph-selection-meta">${buildMetaPill(prettifyType(data.type))}${data.date ? buildMetaPill(prettyDate(data.date)) : ''}${typeof data.severity === 'number' ? buildMetaPill(`Severity ${data.severity}/5`) : ''}${typeof data.hours === 'number' ? buildMetaPill(`${data.hours}h sleep`) : ''}${typeof data.overallScore === 'number' ? buildMetaPill(`Score ${Number(data.overallScore).toFixed(1)}`) : ''}</div>`;
  const secondary = document.createElement('div');
  secondary.className = 'n-graph-panel-card';
  secondary.innerHTML = `<h4>${escapeHtml(I18n.t('graph_attention'))}</h4>`;
  const callouts = document.createElement('div');
  callouts.className = 'n-graph-callout-list';
  if (data.type === 'Symptom') {
    const causalE = selectedNode.connectedEdges().filter(e => e.data('type') === 'LIKELY_CAUSED_BY' || e.data('type') === 'WORSENED_BY');
    if (causalE.length === 0) callouts.appendChild(buildCallout(I18n.t('graph_no_contributor'), I18n.t('graph_no_contributor_desc')));
    else causalE.forEach(e => { const cause = e.source().id() === selectedNode.id() ? e.target() : e.source(); callouts.appendChild(buildCallout(cause.data('label'), e.data('detail') || `${cause.data('label')} is connected.`)); });
  } else if (data.type === 'Day') {
    const events = selectedNode.connectedEdges().filter(e => e.data('type') === 'ON_DAY' || e.data('type') === 'TRIGGERED_ON').connectedNodes().filter(n => n.id() !== selectedNode.id());
    if (events.length === 0) callouts.appendChild(buildCallout(I18n.t('graph_quiet'), I18n.t('graph_quiet_desc')));
    else { const grouped = {}; events.forEach(n => { grouped[n.data('type')] = (grouped[n.data('type')] || 0) + 1; }); Object.entries(grouped).forEach(([type, count]) => { callouts.appendChild(buildCallout(prettifyType(type), `${count} event${count === 1 ? '' : 's'} recorded.`)); }); }
  } else {
    const linked = selectedNode.connectedEdges().connectedNodes().filter(n => n.id() !== selectedNode.id() && n.data('type') === 'Symptom');
    if (linked.length === 0) callouts.appendChild(buildCallout(I18n.t('graph_context'), I18n.t('graph_context_desc')));
    else linked.forEach(n => callouts.appendChild(buildCallout(capitalize(n.data('type')), `${escapeHtml(n.data('label'))} was connected.`)));
  }
  secondary.appendChild(callouts);
  secondary.appendChild(buildLegend());
  return { primary, secondary };
}

function buildCallout(title, body) { const c = document.createElement('div'); c.className = 'n-graph-callout'; c.innerHTML = `<strong>${escapeHtml(title)}</strong><span>${escapeHtml(body)}</span>`; return c; }

// ── Care Plan ──
function buildReminderSetupCard(reminders) {
  const meds = Array.isArray(reminders?.medications) ? reminders.medications : [];
  const custom = Array.isArray(reminders?.customReminders) ? reminders.customReminders : [];
  const schedule = reminders?.checkInSchedule || null;
  const card = makeCard(I18n.t('care_plan_title'), I18n.t('care_plan_desc'), '#2563EB', 'rgba(37,99,235,0.08)');
  card.classList.add('full-width', 'n-care-plan-card');
  const grid = document.createElement('div');
  grid.className = 'n-care-plan-grid';
  const col1 = document.createElement('div'); col1.className = 'n-care-plan-column';
  col1.appendChild(buildOverviewPanel(schedule, meds, custom));
  col1.appendChild(buildMedPanel(meds));
  const col2 = document.createElement('div'); col2.className = 'n-care-plan-column';
  col2.appendChild(buildReminderEditorPanel());
  col2.appendChild(buildReminderListPanel(custom));
  grid.appendChild(col1); grid.appendChild(col2);
  card.appendChild(grid);
  return card;
}

function buildOverviewPanel(schedule, meds, custom) {
  const p = document.createElement('div'); p.className = 'n-care-plan-panel';
  p.innerHTML = `<h4>${escapeHtml(I18n.t('current_plan'))}</h4>`;
  const meta = document.createElement('div'); meta.className = 'n-care-plan-meta';
  meta.appendChild(makePill(I18n.t('custom_reminders_label'), `${custom.length}`));
  meta.appendChild(makePill(I18n.t('active_meds'), `${meds.length}`));
  const morningEnabled = Boolean(scheduleValue(schedule, 'morningEnabled', false));
  const eveningEnabled = Boolean(scheduleValue(schedule, 'eveningEnabled', false));
  if (morningEnabled) meta.appendChild(makePill(I18n.t('morning_checkin'), scheduleValue(schedule, 'morningTime', '08:00')));
  if (eveningEnabled) meta.appendChild(makePill(I18n.t('evening_checkin'), scheduleValue(schedule, 'eveningTime', '20:00')));
  if (!morningEnabled && !eveningEnabled) meta.appendChild(makePill(I18n.t('checkins_label'), I18n.t('no_schedule')));

async function saveReminderDraft() {
  if (!selectedMemberId || !reminderDraft.title.trim()) return;
  await getToken();
  const payload = { title: reminderDraft.title.trim(), note: reminderDraft.note.trim() || undefined, schedule: [reminderDraft.time || '09:00'], isEnabled: reminderDraft.isEnabled };
  const url = reminderDraft.id ? `/api/caregiver/members/${selectedMemberId}/reminders/${reminderDraft.id}` : `/api/caregiver/members/${selectedMemberId}/reminders`;
  const res = await fetch(url, { method: reminderDraft.id ? 'PUT' : 'POST', headers: { ...authHeaders(), 'content-type': 'application/json' }, body: JSON.stringify(payload) });
  if (!res.ok) { alert(`Reminder save failed (${res.status}).`); return; }
  currentDashboardData.reminders = await fetchMemberReminders(selectedMemberId, authHeaders());
  reminderDraft = { id: null, title: '', note: '', time: '09:00', isEnabled: true };
  renderCurrentDashboard();
}

async function deleteReminderFromDashboard(reminderId) {
  if (!selectedMemberId || !reminderId) return;
  await getToken();
  const res = await fetch(`/api/caregiver/members/${selectedMemberId}/reminders/${reminderId}`, { method: 'DELETE', headers: authHeaders() });
  if (!res.ok) { alert(`Delete failed (${res.status}).`); return; }
  currentDashboardData.reminders = await fetchMemberReminders(selectedMemberId, authHeaders());
  if (reminderDraft.id === reminderId) reminderDraft = { id: null, title: '', note: '', time: '09:00', isEnabled: true };
  renderCurrentDashboard();
}
